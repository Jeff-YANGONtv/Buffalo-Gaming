<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကျွဲဂိမ်းစလော့ - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Noto Sans Myanmar', sans-serif; 
            background-color: #020617; 
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sticky Header --- */
        .header-bar {
            position: sticky;
            top: 0;
            background: #0f172a;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 2px solid #fbbf24;
            z-index: 1000;
            padding: 0 15px;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .noti-btn {
            color: #fbbf24;
            font-size: 20px;
            position: relative;
            cursor: pointer;
        }

        .noti-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }

        .marquee-box {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            margin: 0 10px;
        }

        .scrolling-text {
            display: inline-block;
            animation: marquee-move 40s linear infinite;
            color: #fbbf24; 
            font-size: 13px;
        }

        @keyframes marquee-move {
            0% { transform: translateX(0); } 
            100% { transform: translateX(-100%); }
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 110px; /* Privacy text အတွက် နေရာချန် */
            max-width: 450px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .game-card {
            background: #0f172a;
            border-radius: 15px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .btn-play {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #020617;
            padding: 10px;
            text-align: center;
            font-weight: 800;
            text-decoration: none;
            display: block;
            text-transform: uppercase;
        }

        /* Privacy Policy Link (စာသားမျှင်မျှင်လေး) */
        .privacy-link {
            text-align: center;
            font-size: 12px;
            color: rgba(156, 163, 175, 0.7); /* Greyish-transparent မျှင်မျှင်လေး */
            text-decoration: none;
            font-weight: 400;
            margin-top: 10px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .privacy-link:hover {
            color: #fbbf24;
        }

        /* --- Footer --- */
        .footer-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #334155;
            padding: 18px 0;
            text-align: center;
            border-top: 2px solid #fbbf24;
            z-index: 200;
        }

        .footer-link {
            color: #fbbf24;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header class="header-bar">
        <div class="logo-box">
            <img src="https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1774596292785-0a93d753.jpg" 
                 alt="Logo" class="w-10 h-10 rounded-full border border-amber-500">
        </div>

        <div class="marquee-box">
            <span class="scrolling-text">
                စလော့ဂိမ်းပေါင်းများစွာကို ယုံကြည်စွာကစားလိုပါက ဆက်သွယ်ရန် ကိုနှိပ်ပြီး အကောင့်ဖွင့်ပါ။ &nbsp;&nbsp;&nbsp;&nbsp; ★ &nbsp;&nbsp;&nbsp;&nbsp;
            </span>
        </div>

        <div class="noti-btn">
            <i class="fa-solid fa-bell"></i>
            <span class="noti-dot"></span>
        </div>
    </header>

    <main class="main-content">
        <div class="game-card">
            <img src="https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1774598459811-b483f280.jpg" class="card-image">
            <a href="wheel.html" class="btn-play">အပြင်းပြေလှည့်မယ်</a>
        </div>

        <div class="game-card">
            <img src="https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1774606717364-d76984a2.jpg" class="card-image">
            <a href="spin.html" class="btn-play">အပြင်းပြေလှည့်မည်</a>
        </div>

        <a href="privacy.html" class="privacy-link">Privacy Policy</a>
    </main>

    <footer class="footer-fixed">
        <a href="support.html" class="footer-link">ဆက်သွယ်ရန်</a>
    </footer>

</body>
</html>
