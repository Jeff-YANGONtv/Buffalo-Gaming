<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffalo Spin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Noto Sans Myanmar', sans-serif; 
            background-color: #020617; 
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Updated Header (Back + Marquee + Noti) --- */
        .header-bar {
            position: sticky;
            top: 0;
            background: #0f172a;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 2px solid #fbbf24;
            z-index: 1000;
            padding: 0 15px;
        }

        .back-link {
            color: #fbbf24;
            font-size: 22px;
            text-decoration: none;
        }

        .marquee-box {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            margin: 0 15px;
        }

        .scrolling-text {
            display: inline-block;
            animation: marquee-move 30s linear infinite;
            color: #fbbf24; 
            font-size: 13px;
        }

        @keyframes marquee-move {
            0% { transform: translateX(100%); } 
            100% { transform: translateX(-100%); }
        }

        .noti-btn {
            color: #fbbf24;
            font-size: 20px;
            position: relative;
            cursor: pointer;
        }

        .noti-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 80px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: rgba(30, 41, 59, 0.4);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(251, 191, 36, 0.5);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.1);
        }

        .grid-cell {
            width: 85px;
            height: 85px;
            background: #020617;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .slot-icon {
            width: 80%;
            height: 80%;
            object-fit: contain;
            transition: transform 0.1s;
        }

        .spinning {
            filter: blur(4px);
            transform: scale(0.9);
        }

        .spin-btn {
            margin-top: 35px;
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #020617;
            padding: 12px 60px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 900;
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.3);
            cursor: pointer;
            transition: 0.2s;
        }

        .spin-btn:active { transform: scale(0.95); }
        .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- Fixed Footer --- */
        .footer-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e293b;
            padding: 18px 0;
            text-align: center;
            border-top: 2px solid #fbbf24;
            z-index: 1000;
        }

        .footer-link {
            color: #fbbf24;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header class="header-bar">
        <a href="main.html" class="back-link">
            <i class="fa-solid fa-chevron-left"></i>
        </a>

        <div class="marquee-box">
            <span class="scrolling-text">
                စလော့ဂိမ်းပေါင်းများစွာကို ယုံကြည်စွာကစားလိုပါက ဆက်သွယ်ရန် ကိုနှိပ်ပြီး အကောင့်ဖွင့်ပါ။ &nbsp;&nbsp;&nbsp;&nbsp; ★ &nbsp;&nbsp;&nbsp;&nbsp;
            </span>
        </div>

        <div class="noti-btn">
            <i class="fa-solid fa-bell"></i>
            <span class="noti-dot"></span>
        </div>
    </header>

    <main class="main-content">
        <div class="grid-container">
            <div class="grid-cell"><img id="img-0" src="" class="slot-icon"></div>
            <div class="grid-cell"><img id="img-1" src="" class="slot-icon"></div>
            <div class="grid-cell"><img id="img-2" src="" class="slot-icon"></div>
            <div class="grid-cell"><img id="img-3" src="" class="slot-icon"></div>
            <div class="grid-cell"><img id="img-4" src="" class="slot-icon"></div>
            <div class="grid-cell"><img id="img-5" src="" class="slot-icon"></div>
            <div class="grid-cell"><img id="img-6" src="" class="slot-icon"></div>
            <div class="grid-cell"><img id="img-7" src="" class="slot-icon"></div>
            <div class="grid-cell"><img id="img-8" src="" class="slot-icon"></div>
        </div>
        <button id="spinBtn" class="spin-btn" onclick="startSpin()">SPIN</button>
    </main>

    <footer class="footer-fixed">
        <a href="support.html" class="footer-link">ဆက်သွယ်ရန်</a>
    </footer>

    <script>
        const icons = [
            'https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1774599606470-45e0085c.png',
            'https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1774599582613-6cd71de9.png',
            'https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1774599577921-d2fba462.png',
            'https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1774599573007-22e04b79.png',
            'https://repgyetdcodkynrbxocg.supabase.co/storage/v1/object/public/images/telegram-1774596260585-46b828db.jpg'
        ];

        function setIcon(i) {
            const img = document.getElementById(`img-${i}`);
            img.src = icons[Math.floor(Math.random() * icons.length)];
        }

        function init() { for(let i=0; i<9; i++) setIcon(i); }

        function startSpin() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            let count = 0;
            let spinEffect = setInterval(() => {
                for(let i=0; i<9; i++) {
                    const img = document.getElementById(`img-${i}`);
                    img.classList.add('spinning');
                    setIcon(i);
                }
                count++;
                if(count > 20) {
                    clearInterval(spinEffect);
                    for(let i=0; i<9; i++) document.getElementById(`img-${i}`).classList.remove('spinning');
                    btn.disabled = false;
                }
            }, 60); 
        }

        init();
    </script>
</body>
</html>
